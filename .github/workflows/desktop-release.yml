name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'   # trigger on: git tag desktop-v1.0.0 && git push --tags

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: https://tms.intakesense.com
        with:
          projectPath: apps/desktop
          tagName: desktop-v__VERSION__
          releaseName: TaskFlow Desktop v__VERSION__
          releaseBody: |
            ## What's new
            See commit history for changes.

            ## Installation
            Download `TaskFlow_x.x.x_x64-setup.exe` below and run it.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true   # generates latest.json — required for auto-updater
